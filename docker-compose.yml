# Self-host Tez Motors with Docker. Pairs with a Cloudflare Tunnel (free) to
# expose the box at tezmotors.uz without opening ports — see deploy/selfhost.
#
#   1. cp .env.example .env   and fill in the required values
#   2. docker compose up -d --build
#   3. point a Cloudflare Tunnel at http://localhost:3000
#
# Build-time NEXT_PUBLIC_* are read from the same .env via build args.
services:
  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    image: tez-motors
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/robots.txt"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
