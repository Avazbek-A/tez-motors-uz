# Self-host Tez Motors with Docker. Pairs with a Cloudflare Tunnel (free) to
# expose the box at tezmotors.uz without opening ports — see deploy/selfhost.
#
#   1. cp .env.example .env   and fill in the required values
#   2. docker compose up -d --build
#   3. point a Cloudflare Tunnel at http://localhost:3000
#
# Build-time NEXT_PUBLIC_* are read from the same .env via build args.
services:
  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
    image: tez-motors
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/robots.txt"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # Scheduled jobs — the self-host equivalent of the Cloudflare cron Worker.
  # Fires the guarded /api/cron/* routes on the schedule in deploy/selfhost/crontab.
  cron:
    image: alpine:3.20
    restart: unless-stopped
    depends_on:
      - app
    environment:
      APP_URL: http://app:3000
      CRON_SECRET: ${CRON_SECRET}
    volumes:
      - ./deploy/selfhost/fire-cron.sh:/scripts/fire-cron.sh:ro
      - ./deploy/selfhost/crontab:/etc/crontabs/root:ro
    command: sh -c "apk add --no-cache curl >/dev/null 2>&1 && crond -f -l 8"
