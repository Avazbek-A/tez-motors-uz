name = "tez-motors"
main = ".open-next/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"

[observability]
enabled = true

# Durable rate limiting shared across Worker isolates (src/lib/rate-limit-kv.ts).
# Create once:  wrangler kv namespace create RATE_LIMIT_KV
# then paste the returned id below. Until bound, the limiter fails open to the
# in-memory fallback, so the site still runs without this.
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "5073cfd006be4151b665d032d665e885"

# Persistent incremental (ISR / data) cache for OpenNext — DISABLED until R2 is
# enabled in the Cloudflare dashboard (free tier). To re-enable: turn on R2, then
# uncomment this binding AND restore the override in open-next.config.ts.
#   wrangler r2 bucket create tez-motors-cache
# [[r2_buckets]]
# binding = "NEXT_INC_CACHE_R2_BUCKET"
# bucket_name = "tez-motors-cache"

[[routes]]
pattern = "tezmotors.uz"
custom_domain = true

[[routes]]
pattern = "www.tezmotors.uz"
custom_domain = true
